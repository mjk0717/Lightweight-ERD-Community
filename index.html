<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightweight-ERD</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="toolbar">
    <h1>Lightweight-ERD</h1>
    <nav id="menu-bar"></nav>
    <div class="toolbar-spacer"></div>
    <div class="mode-switch">
      <span class="mode-label">Logical</span>
      <label class="toggle">
        <input type="checkbox" id="mode-toggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <span class="mode-label">Physical</span>
    </div>
  </header>

  <main id="canvas-viewport">
    <div id="canvas-transform">
      <svg id="relation-svg"></svg>
      <div id="entity-layer"></div>
    </div>
    <div id="empty-hint">Right-click the canvas and choose "Create Entity/Table", or click "Import DDL", to get started. Drag a table's header to move it, drag its body onto another table to connect a relation, double-click a table to edit its columns.</div>
  </main>

  <script src="dist/bundle.js"></script>
</body>
</html>
